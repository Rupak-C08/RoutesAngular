
<div class="user-detail-container">
    <h1>User Detail</h1>

<table class="detail-table">  
<thead>
 <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Age</th>    
    <th>Gender</th>
    <th>City</th>
    <th>Email</th>
 </tr>
 </thead>
 <tbody>
 <tr>
    <td>{{ userDetail().id }}</td>
    <td>{{ userDetail().name }}</td> 
    <td>{{ userDetail().age }}</td> 
    <td>{{ userDetail().gender }}</td> 
    <td>{{ userDetail().city }}</td> 
    <td>{{ userDetail().email }}</td>   
 </tr>
</tbody>
</table>
</div>
